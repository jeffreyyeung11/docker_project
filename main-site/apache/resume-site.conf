<VirtualHost *:80>

    ServerName resume.jefffolio.com

    DocumentRoot /var/www/html/resume-site/public

    <Directory /var/www/html/resume-site/public>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <Directory /var/www/html/resume-site/public/admin>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
