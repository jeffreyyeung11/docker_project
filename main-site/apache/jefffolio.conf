<VirtualHost *:80>

    ServerName jefffolio.com
    ServerAlias www.jefffolio.com

    DocumentRoot /var/www/html/jefffolio

    <Directory /var/www/html/jefffolio>
        AllowOverride All
        Require all granted
        DirectoryIndex index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
