version: "3.9"

services:

  db:
    image: mariadb:latest
    container_name: mariadb-server
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - webnet
    restart: unless-stopped

  apache:
    build: ./main-site
    container_name: apache-php
    volumes:
      - ./main-site:/var/www/html
    networks:
      - webnet
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/ssl/jefffolio.com_ssl_certificate.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/nginx/ssl/jefffolio.com_private_key.pem:/etc/nginx/ssl/privkey.pem:ro
    networks:
      - webnet
      - monitoring
    depends_on:
      - apache
      - grafana
    restart: unless-stopped

  tracker-app:
    build: ./tracker-app
    container_name: tracker-app
    volumes:
      - ./tracker-app:/app
    expose:
      - "5000"
    networks:
      - webnet
    depends_on:
      - db
    restart: unless-stopped
    
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring
      - webnet

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      GF_SERVER_ROOT_URL: https://grafana.jefffolio.com
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    expose:
      - "9100"
    networks:
      - monitoring

volumes:
  db_data:
  grafana-storage:

networks:
  monitoring:
  webnet:
    driver: bridge
