events {}

http {
    upstream apache_backend {
        server apache:80;
    }

    upstream tracker_backend {
        server tracker-app:5000;
    }
	
    upstream grafana {
	server grafana:3000;
    }
	
    upstream prometheus {
	server prometheus:9090;
    }

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name jefffolio.com www.jefffolio.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name resume.jefffolio.com;
        return 301 https://$host$request_uri;
    }

    server {
         listen 80;
         server_name tracker.jefffolio.com;
         return 301 https://$host$request_uri;
    }

    server {
	listen 80;
	server_name grafana.jefffolio.com;
	return 301 https://$host$request_uri;
    }
	
    server {
	listen 80;
	server_name prometheus.jefffolio.com;
	return 301 https://$host$request_uri;
    }

    # www subdomain HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name www.resume.jefffolio.com;
        return 301 https://resume.jefffolio.com$request_uri;
    }

    server {
        listen 80;
        server_name www.tracker.jefffolio.com;
        return 301 https://tracker.jefffolio.com$request_uri;
    }

    server {
        listen 80;
        server_name www.grafana.jefffolio.com;
        return 301 https://grafana.jefffolio.com$request_uri;
    }

    server {
        listen 80;
        server_name www.prometheus.jefffolio.com;
        return 301 https://prometheus.jefffolio.com$request_uri;
    }

    #  Main Site
    server {
        listen 443 ssl;
        server_name jefffolio.com www.jefffolio.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {
            proxy_pass http://apache_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }

    # Resume Site

    server {
        listen 443 ssl;
        server_name resume.jefffolio.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {
            proxy_pass http://apache_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
       }
        location /admin/ {
	    allow 10.10.10.0/24;
    	    deny all;

            proxy_pass http://apache_backend;
	    proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

      }

    # Tracker Site
    server {
        listen 443 ssl;
        server_name tracker.jefffolio.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {

            proxy_pass http://tracker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
	
	# Grafana
    server {
	listen 443 ssl;
	server_name grafana.jefffolio.com;

	ssl_certificate /etc/nginx/ssl/fullchain.pem;
	ssl_certificate_key /etc/nginx/ssl/privkey.pem;
	
	allow 10.10.10.0/24;
	deny all;

	location / {
		proxy_pass http://grafana;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_http_version 1.1;
	}
   }
	
	# Prometheus
    server {
	listen 443 ssl;
	server_name prometheus.jefffolio.com;

	allow 10.10.10.0/24;
	deny all;

	ssl_certificate /etc/nginx/ssl/fullchain.pem;
	ssl_certificate_key /etc/nginx/ssl/privkey.pem;

	location / {
		proxy_pass http://prometheus;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_http_version 1.1;
	}
   }
}

